{% extends 'store/base.html' %}
{% block title %}Forgot Password — My Shopping{% endblock %}

{% block content %}
<div class="auth-page py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="auth-card card border-0 shadow-lg">
                    <div class="auth-card-header text-center py-4">
                        <div class="auth-icon mb-3"><i class="bi bi-lock-fill"></i></div>
                        <h3 class="mb-1">Forgot Password?</h3>
                        <p class="text-muted mb-0">Enter your email and we'll send a reset link</p>
                    </div>
                    <div class="card-body p-4">
                        <form method="POST" novalidate>
                            {% csrf_token %}
                            <div class="mb-4">
                                <label class="form-label fw-500">Registered Email</label>
                                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
                                {% if form.email.errors %}
                                <div class="invalid-feedback d-block">{{ form.email.errors|join:", " }}</div>
                                {% endif %}
                            </div>
                            <button type="submit" class="btn btn-auth w-100">
                                <i class="bi bi-send me-2"></i>Send Reset Link
                            </button>
                        </form>
                        <hr class="my-4">
                        <p class="text-center mb-0">
                            <a href="{% url 'login' %}" class="auth-link">
                                <i class="bi bi-arrow-left me-1"></i>Back to Login
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
