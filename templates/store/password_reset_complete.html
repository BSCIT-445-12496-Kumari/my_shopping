{% extends 'store/base.html' %}
{% block title %}Password Reset Successful — My Shopping{% endblock %}

{% block content %}
<div class="auth-page py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="auth-card card border-0 shadow-lg text-center">
                    <div class="auth-card-header py-4">
                        <div class="auth-icon mb-3 text-success"><i class="bi bi-check-circle-fill"></i></div>
                        <h3 class="mb-1">Password Reset!</h3>
                        <p class="text-muted mb-0">Your password has been changed successfully</p>
                    </div>
                    <div class="card-body p-4">
                        <div class="alert alert-success mb-4">
                            <i class="bi bi-check-circle me-2"></i>
                            You can now log in with your new password.
                        </div>
                        <a href="{% url 'login' %}" class="btn btn-auth w-100">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Go to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
