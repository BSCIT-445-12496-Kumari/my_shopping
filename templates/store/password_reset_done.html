{% extends 'store/base.html' %}
{% block title %}Email Sent — My Shopping{% endblock %}

{% block content %}
<div class="auth-page py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="auth-card card border-0 shadow-lg text-center">
                    <div class="auth-card-header py-4">
                        <div class="auth-icon mb-3 text-success"><i class="bi bi-envelope-check-fill"></i></div>
                        <h3 class="mb-1">Check Your Email</h3>
                        <p class="text-muted mb-0">A password reset link has been sent</p>
                    </div>
                    <div class="card-body p-4">
                        <div class="alert alert-success">
                            <i class="bi bi-info-circle me-2"></i>
                            If an account exists with that email, you will receive a reset link shortly.
                            The link expires in <strong>24 hours</strong>.
                        </div>
                        <a href="{% url 'login' %}" class="btn btn-auth w-100 mt-2">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Back to Login
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
